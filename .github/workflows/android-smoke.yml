name: Android Build Smoke

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-flight runs when a new commit lands on the same ref.
# Keeps PR queues unblocked when the author force-pushes a fixup.
concurrency:
  group: android-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  assemble-debug:
    name: ./gradlew :app:assembleDebug
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-android-smoke

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          local-cache: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked --version ^3

      - name: Build Rust shared libraries (4 ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          chmod +x ./build_rust.sh
          ./build_rust.sh

      - name: Assemble debug APK
        # Debug variant is unsigned; doesn't need any of the
        # release-only secrets. Catches Kotlin compile errors,
        # missing Hilt providers, AndroidManifest problems, and
        # resource-reference errors that the JNI-only Rust CI
        # can't see.
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Lint debug
        # Non-fatal — lint catches a much broader surface than
        # build, but its baseline includes warnings inherited from
        # the AGP / Compose stack we don't control. Run it for
        # visibility but don't gate the PR on it.
        run: ./gradlew :app:lintDebug --no-daemon || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qubee-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn
