name: Android Instrumented Tests

# Heavyweight workflow — boots an Android emulator, builds the
# release artifacts, runs the `androidTest/` suite. Costs ~10–15
# minutes per run; gated to PRs targeting main + push to main so
# feature-branch pushes don't burn CI minutes on every commit.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual dispatch for debugging without a PR.
  workflow_dispatch:

# Cancel in-flight runs on the same ref so a force-push doesn't
# leave a stale emulator job running for 15 minutes.
concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  emulator-tests:
    name: connectedDebugAndroidTest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # KVM acceleration on the GitHub-hosted runner — without it
    # the emulator boot time goes from ~90s to ~5min.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-android-instrumented

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          local-cache: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked --version ^3

      - name: Build Rust shared libraries (4 ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          chmod +x ./build_rust.sh
          ./build_rust.sh

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # Bump this key whenever the AVD config below changes —
          # otherwise stale snapshots boot into a different image.
          key: avd-api34-x86_64-v2

      - name: Generate AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD warmed up"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace
        env:
          # Match the gradle defaults the release workflow uses so
          # the instrumented build exercises the same versionName /
          # versionCode story.
          ORG_GRADLE_PROJECT_qubeeVersionName: 'instrumented-${{ github.sha }}'

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report-${{ github.sha }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          retention-days: 14
          if-no-files-found: warn
