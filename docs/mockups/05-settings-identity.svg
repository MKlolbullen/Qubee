<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 950" width="460" height="950" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <!-- Galaxy S25 Ultra mock-up: Settings → My Identity panel with share-link QR -->
  <defs>
    <linearGradient id="frameGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a22"/>
      <stop offset="1" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="screenGlare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#12EAD8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#12EAD8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="qrCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1f33"/>
      <stop offset="1" stop-color="#091624"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="24" y="28" width="412" height="894" rx="42"/>
    </clipPath>
    <!-- Reusable QR finder pattern (7×7 modules @ 6px = 42px) -->
    <g id="qrFinder">
      <rect width="42" height="42" fill="#040C16"/>
      <rect x="6" y="6" width="30" height="30" fill="#EAFBFF"/>
      <rect x="12" y="12" width="18" height="18" fill="#040C16"/>
    </g>
  </defs>

  <!-- Phone body -->
  <rect x="6" y="10" width="448" height="930" rx="56" fill="url(#frameGloss)"/>
  <rect x="10" y="14" width="440" height="922" rx="54" fill="#0c0c10" stroke="#23232b" stroke-width="0.7"/>
  <rect x="3" y="220" width="4" height="80" rx="2" fill="#1a1a22"/>
  <rect x="453" y="180" width="4" height="60" rx="2" fill="#1a1a22"/>
  <rect x="453" y="260" width="4" height="100" rx="2" fill="#1a1a22"/>
  <rect x="24" y="28" width="412" height="894" rx="42" fill="#040C16"/>

  <g clip-path="url(#screenClip)">
    <circle cx="80" cy="80" r="180" fill="url(#cyanGlow)"/>
    <circle cx="380" cy="780" r="160" fill="url(#cyanGlow)" opacity="0.55"/>

    <!-- Status bar -->
    <g font-size="11" fill="#EAFBFF">
      <text x="44" y="50" font-weight="600">21:49</text>
      <g transform="translate(370,40)">
        <rect x="0" y="6" width="2" height="4"/>
        <rect x="3" y="4" width="2" height="6"/>
        <rect x="6" y="2" width="2" height="8"/>
        <rect x="9" y="0" width="2" height="10"/>
        <path d="M16 8 q4 -5 10 0" stroke="#EAFBFF" fill="none" stroke-width="1.3"/>
        <path d="M18 6 q3 -3 6 0" stroke="#EAFBFF" fill="none" stroke-width="1.3"/>
        <circle cx="21" cy="9" r="0.9"/>
        <rect x="32" y="2" width="22" height="9" rx="2" fill="none" stroke="#EAFBFF" stroke-width="1"/>
        <rect x="34" y="4" width="14" height="5" fill="#12EAD8"/>
        <rect x="54" y="5" width="2" height="3"/>
        <text x="58" y="9" font-size="10">86%</text>
      </g>
    </g>
    <circle cx="230" cy="46" r="7" fill="#000"/>

    <!-- Header -->
    <g transform="translate(24,86)">
      <text x="0" y="0" fill="#12EAD8" font-size="11" letter-spacing="3" font-weight="700">SETTINGS</text>
      <text x="0" y="34" fill="#EAFBFF" font-size="28" font-weight="800">My identity</text>
      <text x="0" y="56" fill="#A3BDCA" font-size="12">Share this link or QR to bring someone into your contacts.</text>
    </g>

    <!-- Identity card with avatar + name -->
    <g transform="translate(24,168)">
      <rect width="388" height="78" rx="20" fill="#102234" fill-opacity="0.95"/>
      <circle cx="44" cy="39" r="26" fill="#12EAD8" fill-opacity="0.22"/>
      <text x="44" y="46" text-anchor="middle" fill="#EAFBFF" font-size="16" font-weight="800">AP</text>
      <text x="86" y="34" fill="#EAFBFF" font-size="17" font-weight="800">Aisha Petrov</text>
      <text x="86" y="54" fill="#A3BDCA" font-size="12" font-family="ui-monospace, SFMono-Regular, monospace">aisha · qubee://contact/4f7e91…</text>
      <!-- Edit icon -->
      <g transform="translate(348,28)" stroke="#A3BDCA" stroke-width="1.5" fill="none" stroke-linejoin="round">
        <path d="M0 16 v6 h6 l16 -16 l-6 -6 z"/>
        <path d="M14 6 l6 6"/>
      </g>
    </g>

    <!-- Fingerprint -->
    <g transform="translate(24,260)">
      <text x="0" y="0" fill="#A3BDCA" font-size="10" letter-spacing="2" font-weight="700">FINGERPRINT</text>
      <text x="0" y="22" fill="#EAFBFF" font-size="18" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace" letter-spacing="2">4f7e 91a2 b5c8 d390</text>
      <text x="0" y="40" fill="#A3BDCA" font-size="11">BLAKE3 over (Ed25519 ‖ ML-DSA-44) public keys.</text>
    </g>

    <!-- QR card -->
    <g transform="translate(24,322)">
      <rect width="388" height="276" rx="22" fill="url(#qrCard)" stroke="#152639"/>
      <!-- Title -->
      <text x="20" y="28" fill="#EAFBFF" font-size="13" font-weight="700">qubee://contact/4f7e91a2b5c8d390…</text>
      <text x="20" y="44" fill="#A3BDCA" font-size="11">Single-use, expires in 24h.</text>

      <!-- QR canvas -->
      <g transform="translate(116,60)">
        <!-- White quiet-zone -->
        <rect x="-8" y="-8" width="172" height="172" rx="6" fill="#EAFBFF"/>

        <!-- Three finder patterns -->
        <use href="#qrFinder" x="0" y="0"/>
        <use href="#qrFinder" x="114" y="0"/>
        <use href="#qrFinder" x="0" y="114"/>

        <!-- Timing pattern dots (row 6 / col 6 of 21-module grid, 6px each) -->
        <g fill="#040C16">
          <!-- Top timing strip -->
          <rect x="48" y="36" width="6" height="6"/>
          <rect x="60" y="36" width="6" height="6"/>
          <rect x="72" y="36" width="6" height="6"/>
          <rect x="84" y="36" width="6" height="6"/>
          <rect x="96" y="36" width="6" height="6"/>
          <!-- Left timing strip -->
          <rect x="36" y="48" width="6" height="6"/>
          <rect x="36" y="60" width="6" height="6"/>
          <rect x="36" y="72" width="6" height="6"/>
          <rect x="36" y="84" width="6" height="6"/>
          <rect x="36" y="96" width="6" height="6"/>
          <!-- Alignment pattern (5x5 around (15,15) module → x=90,y=90) -->
          <g transform="translate(90,90)">
            <rect width="30" height="30" fill="#040C16"/>
            <rect x="6" y="6" width="18" height="18" fill="#EAFBFF"/>
            <rect x="12" y="12" width="6" height="6" fill="#040C16"/>
          </g>
        </g>
        <!-- Plausible payload modules — pseudo-random fill -->
        <g fill="#040C16">
          <rect x="48" y="48" width="6" height="6"/>
          <rect x="60" y="48" width="6" height="6"/>
          <rect x="84" y="48" width="6" height="6"/>
          <rect x="48" y="60" width="6" height="6"/>
          <rect x="72" y="60" width="6" height="6"/>
          <rect x="96" y="60" width="6" height="6"/>
          <rect x="48" y="72" width="6" height="6"/>
          <rect x="60" y="72" width="6" height="6"/>
          <rect x="48" y="84" width="6" height="6"/>
          <rect x="84" y="84" width="6" height="6"/>
          <rect x="60" y="96" width="6" height="6"/>
          <rect x="72" y="96" width="6" height="6"/>
          <rect x="48" y="108" width="6" height="6"/>
          <rect x="60" y="108" width="6" height="6"/>
          <rect x="84" y="108" width="6" height="6"/>
          <rect x="48" y="120" width="6" height="6"/>
          <rect x="72" y="120" width="6" height="6"/>
          <rect x="96" y="120" width="6" height="6"/>
          <rect x="48" y="132" width="6" height="6"/>
          <rect x="60" y="132" width="6" height="6"/>
          <rect x="84" y="132" width="6" height="6"/>
          <rect x="60" y="144" width="6" height="6"/>
          <rect x="72" y="144" width="6" height="6"/>
          <rect x="96" y="144" width="6" height="6"/>
          <!-- Right of finder TR -->
          <rect x="120" y="48" width="6" height="6"/>
          <rect x="132" y="48" width="6" height="6"/>
          <rect x="120" y="60" width="6" height="6"/>
          <rect x="144" y="60" width="6" height="6"/>
          <rect x="132" y="72" width="6" height="6"/>
          <rect x="120" y="84" width="6" height="6"/>
          <rect x="144" y="84" width="6" height="6"/>
          <rect x="132" y="96" width="6" height="6"/>
          <rect x="120" y="108" width="6" height="6"/>
          <rect x="144" y="120" width="6" height="6"/>
          <rect x="132" y="132" width="6" height="6"/>
          <rect x="120" y="144" width="6" height="6"/>
          <rect x="144" y="144" width="6" height="6"/>
          <!-- Below finder BL -->
          <rect x="48" y="120" width="6" height="6"/>
          <rect x="60" y="132" width="6" height="6"/>
          <rect x="84" y="120" width="6" height="6"/>
          <rect x="48" y="144" width="6" height="6"/>
          <rect x="72" y="132" width="6" height="6"/>
          <!-- A bit of column 0 above BL finder -->
          <rect x="0" y="48" width="6" height="6"/>
          <rect x="0" y="72" width="6" height="6"/>
          <rect x="0" y="96" width="6" height="6"/>
          <rect x="12" y="60" width="6" height="6"/>
          <rect x="12" y="84" width="6" height="6"/>
          <rect x="24" y="48" width="6" height="6"/>
          <rect x="24" y="72" width="6" height="6"/>
          <rect x="24" y="96" width="6" height="6"/>
        </g>
        <!-- Brand mark in center -->
        <rect x="68" y="68" width="20" height="20" rx="4" fill="#EAFBFF"/>
        <text x="78" y="84" text-anchor="middle" fill="#040C16" font-size="11" font-weight="900" font-family="ui-monospace, SFMono-Regular, monospace">Q</text>
      </g>

      <!-- Buttons row -->
      <g transform="translate(20,232)">
        <!-- Copy -->
        <rect width="170" height="36" rx="12" fill="none" stroke="#12EAD8" stroke-width="1.4"/>
        <g transform="translate(20,11)" stroke="#12EAD8" stroke-width="1.4" fill="none">
          <rect x="0" y="0" width="10" height="12" rx="2"/>
          <path d="M3 0 v-2 h10 v12 h-2"/>
        </g>
        <text x="46" y="24" fill="#12EAD8" font-size="13" font-weight="700">Copy link</text>
        <!-- Share -->
        <g transform="translate(178,0)">
          <rect width="170" height="36" rx="12" fill="#12EAD8"/>
          <g transform="translate(22,9)" stroke="#040C16" stroke-width="1.6" fill="none">
            <circle cx="3" cy="3" r="3"/>
            <circle cx="3" cy="15" r="3"/>
            <circle cx="14" cy="9" r="3"/>
            <line x1="6" y1="4" x2="11" y2="7"/>
            <line x1="6" y1="14" x2="11" y2="11"/>
          </g>
          <text x="50" y="24" fill="#040C16" font-size="13" font-weight="800">Share…</text>
        </g>
      </g>
    </g>

    <!-- Preferences list -->
    <g transform="translate(24,618)">
      <text x="0" y="0" fill="#A3BDCA" font-size="10" letter-spacing="2" font-weight="700">PREFERENCES</text>
      <g transform="translate(0,16)">
        <!-- Notifications -->
        <rect width="388" height="48" rx="14" fill="#102234" fill-opacity="0.85"/>
        <g transform="translate(16,16)" stroke="#12EAD8" stroke-width="1.5" fill="none">
          <path d="M2 12 v-4 a8 8 0 0 1 16 0 v4 l2 4 h-20 z"/>
          <path d="M8 18 a3 2 0 0 0 4 0"/>
        </g>
        <text x="48" y="29" fill="#EAFBFF" font-size="13.5" font-weight="700">Notifications</text>
        <text x="372" y="29" text-anchor="end" fill="#A3BDCA" font-size="11">All chats</text>
      </g>
      <g transform="translate(0,72)">
        <rect width="388" height="48" rx="14" fill="#102234" fill-opacity="0.85"/>
        <g transform="translate(16,16)" stroke="#12EAD8" stroke-width="1.5" fill="none">
          <circle cx="10" cy="10" r="8"/>
          <path d="M10 2 a8 8 0 0 0 0 16 z" fill="#12EAD8" stroke="none"/>
        </g>
        <text x="48" y="29" fill="#EAFBFF" font-size="13.5" font-weight="700">Theme</text>
        <text x="372" y="29" text-anchor="end" fill="#A3BDCA" font-size="11">Cyan dark</text>
      </g>
      <g transform="translate(0,128)">
        <rect width="388" height="48" rx="14" fill="#102234" fill-opacity="0.85"/>
        <g transform="translate(16,16)" stroke="#12EAD8" stroke-width="1.5" fill="none">
          <circle cx="10" cy="10" r="8"/>
          <path d="M2 10 h16 M10 2 a12 12 0 0 1 0 16 a12 12 0 0 1 0 -16"/>
        </g>
        <text x="48" y="29" fill="#EAFBFF" font-size="13.5" font-weight="700">Network bootstrap</text>
        <text x="372" y="29" text-anchor="end" fill="#A3BDCA" font-size="11">3 peers</text>
      </g>
      <g transform="translate(0,184)">
        <rect width="388" height="48" rx="14" fill="none" stroke="#FF5C7A" stroke-opacity="0.45"/>
        <g transform="translate(16,16)" stroke="#FF5C7A" stroke-width="1.5" fill="none">
          <path d="M2 4 h16 M5 4 v14 a2 2 0 0 0 2 2 h6 a2 2 0 0 0 2 -2 v-14"/>
        </g>
        <text x="48" y="29" fill="#FF5C7A" font-size="13.5" font-weight="700">Reset identity</text>
      </g>
    </g>

    <!-- Bottom navigation -->
    <g transform="translate(0,840)">
      <rect x="24" y="0" width="412" height="64" rx="22" fill="#0a1726" fill-opacity="0.92" stroke="#152639"/>
      <g transform="translate(82,18)" stroke="#A3BDCA" stroke-width="1.6" fill="none">
        <path d="M0 18 v-12 a4 4 0 0 1 4 -4 h16 a4 4 0 0 1 4 4 v12"/>
        <path d="M0 14 h6 l3 4 h6 l3 -4 h6"/>
      </g>
      <text x="116" y="56" text-anchor="middle" fill="#A3BDCA" font-size="10">Inbox</text>
      <g transform="translate(220,18)" stroke="#A3BDCA" stroke-width="1.6" fill="none">
        <circle cx="10" cy="6" r="4"/>
        <path d="M2 22 q8 -10 16 0"/>
      </g>
      <text x="232" y="56" text-anchor="middle" fill="#A3BDCA" font-size="10">Contacts</text>
      <!-- Settings (selected) -->
      <g transform="translate(316,18)">
        <rect x="-12" y="-2" width="84" height="32" rx="16" fill="#12EAD8" fill-opacity="0.18"/>
        <g stroke="#12EAD8" stroke-width="1.6" fill="none">
          <circle cx="10" cy="10" r="4"/>
          <path d="M10 0 v3 M10 17 v3 M0 10 h3 M17 10 h3 M3 3 l2 2 M15 15 l2 2 M3 17 l2 -2 M15 5 l2 -2"/>
        </g>
      </g>
      <text x="350" y="44" fill="#12EAD8" font-size="11" font-weight="700">Settings</text>
    </g>

    <rect x="170" y="900" width="120" height="4" rx="2" fill="#A3BDCA" fill-opacity="0.6"/>
    <rect x="24" y="28" width="412" height="894" rx="42" fill="url(#screenGlare)" pointer-events="none"/>
  </g>
</svg>
