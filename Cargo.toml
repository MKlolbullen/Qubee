[package]
name = "qubee_crypto"
version = "0.3.1"
edition = "2021"
authors = ["Victor Åhgren"]
description = "Android JNI cryptography core and authenticated websocket relay for Qubee"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0.98"
base64 = "0.22.1"
bincode = "1.3.3"
blake3 = "1.5.4"
chacha20poly1305 = "0.10.1"
double-ratchet = "0.1.0"
crc32fast = "1.4.2"
ed25519-dalek = { version = "2.1.1", features = ["rand_core", "zeroize", "serde"] }
hex = "0.4.3"
futures-util = "0.3.31"
getrandom = "0.2.15"
hkdf = "0.12.4"
jni = "0.21.1"
lazy_static = "1.4.0"
libc = "0.2.169"
libp2p = { version = "0.54.1", default-features = false, features = ["tokio", "tcp", "noise", "yamux", "macros", "dns"] }
pqcrypto-dilithium = "0.5.0"
pqcrypto-traits = "0.3.5"
pqcrypto-kyber = "0.8.1"
rand = "0.8.5"
rand_chacha = "0.3.1"
rand_core = { version = "0.6.4", features = ["getrandom"] }
secrecy = "0.8.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
sha2 = "0.10.8"
subtle = "2.6.1"
thiserror = "1.0.69"
tokio = { version = "1.47.0", features = ["full"] }
tokio-tungstenite = { version = "0.24.0", features = ["rustls-tls-webpki-roots"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter", "json"] }
tokio-rustls = "0.26.1"
rustls-pemfile = "2.2.0"
uuid = { version = "1.11.1", features = ["v4", "serde"] }
webrtc = "0.11.0"
x25519-dalek = { version = "2.0.1", features = ["static_secrets", "serde"] }
zeroize = { version = "1.8.1", features = ["zeroize_derive"] }
argon2 = "0.5.3"
dirs = "5.0.1"

[dev-dependencies]
proptest = "1.6.0"
tempfile = "3.13.0"
