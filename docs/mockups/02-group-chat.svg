<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 950" width="460" height="950" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
  <!-- Galaxy S25 Ultra mock-up: Group chat (Berlin Sec Crew) -->
  <defs>
    <linearGradient id="frameGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a22"/>
      <stop offset="1" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="screenGlare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#12EAD8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#12EAD8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="myBubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12EAD8" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0E5F59" stop-opacity="0.95"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="24" y="28" width="412" height="894" rx="42"/>
    </clipPath>
  </defs>

  <!-- Phone body -->
  <rect x="6" y="10" width="448" height="930" rx="56" fill="url(#frameGloss)"/>
  <rect x="10" y="14" width="440" height="922" rx="54" fill="#0c0c10" stroke="#23232b" stroke-width="0.7"/>
  <rect x="3" y="220" width="4" height="80" rx="2" fill="#1a1a22"/>
  <rect x="453" y="180" width="4" height="60" rx="2" fill="#1a1a22"/>
  <rect x="453" y="260" width="4" height="100" rx="2" fill="#1a1a22"/>
  <rect x="24" y="28" width="412" height="894" rx="42" fill="#040C16"/>

  <g clip-path="url(#screenClip)">
    <circle cx="80" cy="80" r="160" fill="url(#cyanGlow)"/>
    <circle cx="380" cy="700" r="160" fill="url(#cyanGlow)" opacity="0.5"/>

    <!-- Status bar -->
    <g font-size="11" fill="#EAFBFF">
      <text x="44" y="50" font-weight="600">21:48</text>
      <g transform="translate(370,40)">
        <rect x="0" y="6" width="2" height="4"/>
        <rect x="3" y="4" width="2" height="6"/>
        <rect x="6" y="2" width="2" height="8"/>
        <rect x="9" y="0" width="2" height="10"/>
        <path d="M16 8 q4 -5 10 0" stroke="#EAFBFF" fill="none" stroke-width="1.3"/>
        <path d="M18 6 q3 -3 6 0" stroke="#EAFBFF" fill="none" stroke-width="1.3"/>
        <circle cx="21" cy="9" r="0.9"/>
        <rect x="32" y="2" width="22" height="9" rx="2" fill="none" stroke="#EAFBFF" stroke-width="1"/>
        <rect x="34" y="4" width="14" height="5" fill="#12EAD8"/>
        <rect x="54" y="5" width="2" height="3"/>
        <text x="58" y="9" font-size="10">86%</text>
      </g>
    </g>
    <circle cx="230" cy="46" r="7" fill="#000"/>

    <!-- Top bar -->
    <g transform="translate(24,76)">
      <rect width="412" height="74" fill="#040C16"/>
      <!-- Back arrow -->
      <g transform="translate(8,38)" stroke="#EAFBFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 0 L0 10 L10 20"/>
      </g>
      <!-- Group avatar -->
      <circle cx="50" cy="38" r="20" fill="#12EAD8" fill-opacity="0.18"/>
      <text x="50" y="44" text-anchor="middle" fill="#EAFBFF" font-size="13" font-weight="700">BS</text>
      <circle cx="62" cy="24" r="6" fill="#0a1726" stroke="#12EAD8" stroke-width="1"/>
      <path d="M58 26 a3.5 2.5 0 1 0 8 0" fill="none" stroke="#12EAD8" stroke-width="1"/>
      <!-- Title + subtitle (whole region tappable to open Details) -->
      <text x="84" y="34" fill="#EAFBFF" font-size="16" font-weight="800">Berlin Sec Crew</text>
      <g>
        <text x="84" y="52" fill="#A3BDCA" font-size="11">8 members · g=4</text>
        <!-- Chevron-down to hint at "tap to open details" -->
        <path d="M138 47 l4 4 l4 -4" stroke="#A3BDCA" stroke-width="1.4" fill="none"/>
      </g>
      <!-- Shield on right (verified group key) -->
      <g transform="translate(360,18)">
        <path d="M14 0 l14 -3 l14 3 v14 q0 11 -14 18 q-14 -7 -14 -18 z" fill="none" stroke="#12EAD8" stroke-width="1.4" transform="scale(0.55)"/>
        <path d="M11 13 l3 3 l5 -5" transform="scale(0.7) translate(-3,1)" stroke="#12EAD8" stroke-width="1.6" fill="none"/>
      </g>
      <!-- Divider -->
      <line x1="0" y1="74" x2="412" y2="74" stroke="#152639"/>
    </g>

    <!-- Date pill -->
    <g transform="translate(180,168)">
      <rect width="100" height="22" rx="11" fill="#102234" fill-opacity="0.85"/>
      <text x="50" y="15" text-anchor="middle" fill="#A3BDCA" font-size="10" letter-spacing="1.5">TODAY · 21:30</text>
    </g>

    <!-- Messages -->
    <g transform="translate(34,206)">
      <!-- Lina (incoming) -->
      <text x="14" y="0" fill="#12EAD8" font-size="11" font-weight="700">Lina · Admin</text>
      <g transform="translate(0,8)">
        <rect width="244" height="46" rx="16" fill="#102234"/>
        <text x="14" y="20" fill="#EAFBFF" font-size="13">rotated the key after Bo left.</text>
        <text x="14" y="36" fill="#EAFBFF" font-size="13">everyone should be on g=4 now.</text>
        <text x="220" y="56" fill="#A3BDCA" font-size="9" text-anchor="end">21:31</text>
      </g>

      <!-- Lina second short -->
      <g transform="translate(0,76)">
        <rect width="118" height="30" rx="16" fill="#102234"/>
        <text x="14" y="20" fill="#EAFBFF" font-size="13">decrypts cleanly?</text>
        <text x="100" y="40" fill="#A3BDCA" font-size="9" text-anchor="end">21:32</text>
      </g>

      <!-- Me (outgoing) -->
      <g transform="translate(146,128)">
        <rect width="216" height="44" rx="16" fill="url(#myBubble)"/>
        <text x="14" y="20" fill="#040C16" font-size="13" font-weight="600">got it, decrypt OK on g=4.</text>
        <text x="14" y="36" fill="#040C16" font-size="13" font-weight="600">let's add Mira tomorrow.</text>
        <text x="200" y="56" fill="#A3BDCA" font-size="9" text-anchor="end">21:33 ✓✓</text>
      </g>

      <!-- Klaus -->
      <text x="14" y="200" fill="#12EAD8" font-size="11" font-weight="700">Klaus</text>
      <g transform="translate(0,208)">
        <rect width="60" height="32" rx="16" fill="#102234"/>
        <text x="30" y="22" fill="#EAFBFF" font-size="16" text-anchor="middle">👍</text>
        <text x="55" y="42" fill="#A3BDCA" font-size="9" text-anchor="end">21:34</text>
      </g>

      <!-- Lina with system note style -->
      <g transform="translate(0,256)">
        <rect width="280" height="46" rx="16" fill="#102234"/>
        <text x="14" y="20" fill="#EAFBFF" font-size="13">btw I just promoted Mira to Moderator.</text>
        <text x="14" y="36" fill="#A3BDCA" font-size="11" font-style="italic">RoleChange landed at g=4</text>
        <text x="256" y="56" fill="#A3BDCA" font-size="9" text-anchor="end">21:35</text>
      </g>

      <!-- Me reply -->
      <g transform="translate(184,322)">
        <rect width="178" height="32" rx="16" fill="url(#myBubble)"/>
        <text x="14" y="20" fill="#040C16" font-size="13" font-weight="600">noted, see her in roster ✓</text>
        <text x="160" y="42" fill="#A3BDCA" font-size="9" text-anchor="end">21:36 ✓✓</text>
      </g>
    </g>

    <!-- Encrypted-state ribbon -->
    <g transform="translate(24,640)">
      <rect width="388" height="34" rx="14" fill="#0a1726" stroke="#12EAD8" stroke-opacity="0.25"/>
      <g transform="translate(14,8)" stroke="#12EAD8" stroke-width="1.4" fill="none">
        <rect x="0" y="6" width="14" height="12" rx="2"/>
        <path d="M3 6 v-3 a4 4 0 0 1 8 0 v3"/>
      </g>
      <text x="40" y="22" fill="#A3BDCA" font-size="11">End-to-end encrypted · ML-KEM-768 group key g=4</text>
    </g>

    <!-- Composer -->
    <g transform="translate(24,772)">
      <rect width="412" height="60" fill="#040C16"/>
      <!-- Attachment -->
      <g transform="translate(8,16)" stroke="#12EAD8" stroke-width="1.6" fill="none">
        <path d="M22 4 l-12 12 a6 6 0 0 0 8 8 l12 -12 a4 4 0 0 0 -6 -6 l-10 10 a2 2 0 0 0 3 3 l8 -8"/>
      </g>
      <!-- Input pill -->
      <rect x="50" y="10" width="288" height="40" rx="20" fill="#0a1726" stroke="#152639"/>
      <text x="68" y="36" fill="#A3BDCA" font-size="13">Message Berlin Sec Crew…</text>
      <!-- Mic -->
      <g transform="translate(316,18)" stroke="#A3BDCA" stroke-width="1.6" fill="none">
        <rect x="6" y="0" width="8" height="14" rx="4"/>
        <path d="M2 12 a8 8 0 0 0 16 0"/>
        <line x1="10" y1="20" x2="10" y2="24"/>
      </g>
      <!-- Send button -->
      <g transform="translate(348,8)">
        <circle cx="22" cy="22" r="22" fill="#12EAD8"/>
        <path d="M14 22 l16 -8 l-6 8 l6 8 z" fill="#040C16"/>
      </g>
    </g>

    <!-- Home indicator -->
    <rect x="170" y="900" width="120" height="4" rx="2" fill="#A3BDCA" fill-opacity="0.6"/>
    <rect x="24" y="28" width="412" height="894" rx="42" fill="url(#screenGlare)" pointer-events="none"/>
  </g>
</svg>
