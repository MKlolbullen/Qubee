<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" font-family="Roboto, system-ui, sans-serif">
  <title>Mockup — Group invite (default landing)</title>
  <desc>GroupInviteFragment with no generated link and no scanned invite. Hosted inside MainActivity, so the toolbar + bottom navigation are present.</desc>

  <!-- phone frame -->
  <rect x="0" y="0" width="360" height="780" rx="36" fill="#0F172A"/>
  <rect x="6" y="6" width="348" height="768" rx="32" fill="#F5F7FB"/>

  <!-- status bar -->
  <g font-size="11" fill="#FFFFFF">
    <rect x="6" y="6" width="348" height="32" fill="#0D47A1"/>
    <text x="22" y="28">9:41</text>
    <g transform="translate(290 14)">
      <rect x="0" y="6" width="14" height="10" rx="2" fill="none" stroke="#FFFFFF"/>
      <rect x="2" y="8" width="9" height="6" fill="#FFFFFF"/>
      <rect x="14" y="9" width="2" height="4" fill="#FFFFFF"/>
      <text x="22" y="14">100%</text>
    </g>
  </g>

  <!-- toolbar (Theme.Qubee primary, label from nav graph: "Group invite") -->
  <rect x="6" y="38" width="348" height="56" fill="#1F6FEB"/>
  <text x="22" y="72" font-size="18" fill="#FFFFFF" font-weight="500">Group invite</text>
  <!-- overflow + new chat icons (top app bar default actions) -->
  <g fill="#FFFFFF" transform="translate(290 60)">
    <circle cx="0" cy="0" r="2"/>
    <circle cx="0" cy="6" r="2"/>
    <circle cx="0" cy="12" r="2"/>
  </g>
  <g fill="none" stroke="#FFFFFF" stroke-width="2" transform="translate(258 56)">
    <circle cx="6" cy="6" r="6"/>
    <line x1="6" y1="2" x2="6" y2="10"/>
    <line x1="2" y1="6" x2="10" y2="6"/>
  </g>

  <!-- content (Column with verticalScroll, padding 20dp) -->
  <g transform="translate(20 110)">

    <!-- headlineSmall "Group invite" + bodySmall member-cap -->
    <text x="160" y="22" text-anchor="middle" font-size="20" fill="#0F172A" font-weight="500">Group invite</text>
    <text x="160" y="40" text-anchor="middle" font-size="11" fill="#475569">
      Up to 16 members per group (creator included).
    </text>

    <!-- "Name a new group" — visible because no link/invite yet -->
    <g transform="translate(0 64)">
      <rect x="0" y="0" width="320" height="56" rx="6" fill="none" stroke="#94A3B8"/>
      <text x="14" y="22" font-size="11" fill="#64748B">Name a new group</text>
      <text x="14" y="42" font-size="14" fill="#94A3B8">(empty)</text>
    </g>

    <!-- Disabled "Create group + invite" button -->
    <g transform="translate(0 132)">
      <rect x="0" y="0" width="320" height="44" rx="22" fill="#1F6FEB" opacity="0.32"/>
      <text x="160" y="28" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="500">Create group + invite</text>
    </g>

    <!-- 16dp spacer, OutlinedButton "Scan invite QR" -->
    <g transform="translate(0 192)">
      <rect x="0" y="0" width="320" height="44" rx="22" fill="none" stroke="#1F6FEB"/>
      <g fill="#1F6FEB" transform="translate(40 14)">
        <rect x="0" y="0" width="6" height="6"/>
        <rect x="10" y="0" width="6" height="6"/>
        <rect x="0" y="10" width="6" height="6"/>
      </g>
      <text x="160" y="28" text-anchor="middle" font-size="14" fill="#1F6FEB" font-weight="500">Scan invite QR</text>
    </g>

    <!-- 12dp spacer, paste link OutlinedTextField -->
    <g transform="translate(0 252)">
      <rect x="0" y="0" width="320" height="56" rx="6" fill="none" stroke="#94A3B8"/>
      <text x="14" y="22" font-size="11" fill="#64748B">Or paste qubee://invite/...</text>
      <text x="14" y="42" font-size="14" fill="#94A3B8">(empty)</text>
    </g>

    <!-- Disabled "Inspect link" button -->
    <g transform="translate(0 320)">
      <rect x="0" y="0" width="320" height="44" rx="22" fill="#1F6FEB" opacity="0.32"/>
      <text x="160" y="28" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="500">Inspect link</text>
    </g>

  </g>

  <!-- bottom navigation -->
  <rect x="6" y="710" width="348" height="64" fill="#FFFFFF" stroke="#E2E8F0"/>
  <g transform="translate(6 710)">
    <!-- Chats -->
    <g transform="translate(40 12)">
      <rect x="0" y="0" width="24" height="24" fill="none"/>
      <path d="M 4 6 H 20 V 16 H 12 L 8 20 V 16 H 4 Z" fill="none" stroke="#475569" stroke-width="1.5"/>
      <text x="12" y="38" text-anchor="middle" font-size="10" fill="#475569">Chats</text>
    </g>
    <!-- Contacts -->
    <g transform="translate(160 12)">
      <circle cx="12" cy="9" r="4" fill="none" stroke="#475569" stroke-width="1.5"/>
      <path d="M 4 22 C 4 16 20 16 20 22" fill="none" stroke="#475569" stroke-width="1.5"/>
      <text x="12" y="38" text-anchor="middle" font-size="10" fill="#475569">Contacts</text>
    </g>
    <!-- Settings -->
    <g transform="translate(280 12)">
      <circle cx="12" cy="12" r="3" fill="none" stroke="#475569" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="9" fill="none" stroke="#475569" stroke-width="1.5"/>
      <text x="12" y="38" text-anchor="middle" font-size="10" fill="#475569">Settings</text>
    </g>
  </g>

  <text x="180" y="755" text-anchor="middle" font-size="9" fill="#94A3B8">— mockup —</text>
</svg>
